<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: transparent !important;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  #sc-iframe { width: 1px; height: 1px; position: absolute; opacity: 0; pointer-events: none; }

  .wrap {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: #111;
  }

  .wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .play-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    border-radius: 50%;
    background: #fa2138;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(0,0,0,0.45);
    transition: transform 0.12s ease;
  }

  .play-btn:active { transform: translate(-50%, -50%) scale(0.92); }

  .play-btn svg { display: block; }
  .play-btn #icon-pause { display: none; }
</style>
</head>
<body>

<div class="wrap">
  <iframe id="sc-iframe" src=""></iframe>
  <img id="art-img" src="" alt="">
  <button class="play-btn" id="btn-play" aria-label="Play">
    <svg id="icon-play" width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
    <svg id="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
  </button>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);

  // Track/playlist to play — pass ?url=<encoded SoundCloud link>
  let trackUrl = "https://soundcloud.com/rich-off-creative-minds/want-what-i-want-gunna-remix";
  if (params.get('url')) {
    try { trackUrl = decodeURIComponent(params.get('url')); } catch(e) { trackUrl = params.get('url'); }
  }

  // Background image — pass ?img=<encoded image URL>. Falls back to SoundCloud artwork if omitted.
  const imgParam = params.get('img');
  if (imgParam) {
    try { document.getElementById('art-img').src = decodeURIComponent(imgParam); } catch(e) { document.getElementById('art-img').src = imgParam; }
  }

  const iframe = document.getElementById('sc-iframe');
  iframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(trackUrl)}&auto_play=false&show_artwork=false&hide_related=true`;

  const widget = SC.Widget(iframe);
  let playing = false;

  widget.bind(SC.Widget.Events.READY, () => {
    if (!imgParam) {
      widget.getCurrentSound(sound => {
        if (sound && sound.artwork_url) {
          document.getElementById('art-img').src = sound.artwork_url.replace('-large', '-t500x500');
        }
      });
    }
  });

  widget.bind(SC.Widget.Events.PLAY, () => {
    playing = true;
    document.getElementById('icon-play').style.display = 'none';
    document.getElementById('icon-pause').style.display = 'block';
  });

  widget.bind(SC.Widget.Events.PAUSE, () => {
    playing = false;
    document.getElementById('icon-play').style.display = 'block';
    document.getElementById('icon-pause').style.display = 'none';
  });

  document.getElementById('btn-play').addEventListener('click', () => {
    widget.toggle();
  });
</script>
</body>
</html>
